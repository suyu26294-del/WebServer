# ============================================================
# WebServer 配置文件
# ============================================================

# ── 基础配置 ──────────────────────────────────────────────────
port         = 9006
thread_num   = 8
timeout_ms   = 60000     # 连接超时时长（毫秒），0 表示不超时

# ── 日志配置 ──────────────────────────────────────────────────
log_open       = true
log_level      = 1        # 0=DEBUG 1=INFO 2=WARN 3=ERROR
log_queue_size = 1024     # 异步日志队列大小，0=同步日志

# ── MySQL 配置 ────────────────────────────────────────────────
sql_open      = false     # 是否启用数据库功能
sql_host      = 127.0.0.1
sql_port      = 3306
sql_user      = root
sql_pwd       = your_password
sql_db        = webserver
sql_pool_size = 10
